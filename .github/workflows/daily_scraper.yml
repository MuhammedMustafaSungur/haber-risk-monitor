name: Daily Haber Scraper

on:
  schedule:
    - cron: "0 5,9,13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: haber-scraper-main
  cancel-in-progress: false

jobs:
  run-scraper:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Show run time
        run: |
          echo "UTC time:"
          date -u
          echo "Turkey time:"
          TZ="Europe/Istanbul" date

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: |
          python Haber_final.py

      - name: Show output files
        run: |
          echo "Data folder:"
          ls -lah data || true
          echo "Git status:"
          git status --short

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/haberler_final.csv data/haberler_final.xlsx

          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Daily update - $(TZ='Europe/Istanbul' date '+%Y-%m-%d %H:%M')"
            git push
          fi